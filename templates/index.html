<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Predictor</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #000000, #1a0000, #330000);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: #111;
            padding: 30px;
            width: 350px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.4);
            text-align: center;
            animation: fadeIn 1s ease-in-out;
        }

        h2 {
            margin-bottom: 20px;
            color: #ff4d4d;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #444;
            background: #222;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #ff4d4d;
            box-shadow: 0 0 10px #ff1a1a;
        }

        button {
            width: 95%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, #ff0000, #990000);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px red;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: #1a0000;
            animation: pop 0.5s ease;
        }

        .marks {
            font-size: 30px;
            font-weight: bold;
            color: #ff3333;
            text-shadow: 0 0 10px red;
        }

        .pass {
            color: #00ff99;
            font-weight: bold;
        }

        .fail {
            color: #ff3333;
            font-weight: bold;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

    </style>
</head>

<body>

<div class="container">
    <h2>🔥 Student Predictor</h2>

    <form action="/predict" method="post">
        <input type="number" name="hours" placeholder="📚 Study Hours" required>
        <input type="number" name="attendance" placeholder="📅 Attendance %" required>
        <input type="number" name="prev_marks" placeholder="📝 Previous Marks" required>

        <button type="submit">🚀 Predict</button>
    </form>

    {% if prediction %}
    <div class="result">
        <div class="marks" id="marks">0</div>

        <h3 class="{{ 'pass' if result == 'Pass' else 'fail' }}">
            🎯 Result: {{ result }}
        </h3>
    </div>

    <script>
        let finalMarks = {{ prediction }};
        let count = 0;
        let speed = 20;

        let counter = setInterval(() => {
            count++;
            document.getElementById("marks").innerText = "📊 Marks: " + count;

            if(count >= finalMarks){
                clearInterval(counter);
            }
        }, speed);
    </script>
    {% endif %}

</div>

</body>
</html>
